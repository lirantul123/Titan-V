apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "titan-v-app.fullname" . }}-nginx
  labels:
    {{- include "titan-v-app.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen {{ .Values.service.port }};
      server_name _;
      root /usr/share/nginx/html;
      index index.html;
      location / {
        try_files $uri $uri/ /index.html;
      }
      location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
      }
    }
