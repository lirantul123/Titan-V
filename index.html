<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN-V</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { --neon-cyan: #00f3ff; --alert-red: #ff3131; }
        body { background-color: #020203; font-family: 'Inter', sans-serif; overflow: hidden; color: #e0e0e0; cursor: none; }
        .glass { background: rgba(10, 12, 18, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(0, 243, 255, 0.2); }
        .data-font { font-family: 'JetBrains Mono', monospace; }
        
        #map { background: #000; height: 100%; width: 100%; cursor: none !important; }
        .leaflet-container, .leaflet-interactive { cursor: none !important; }

        /* Crosshair */
        #crosshair-v, #crosshair-h { position: fixed; background: var(--neon-cyan); pointer-events: none; z-index: 9999; opacity: 0.6; box-shadow: 0 0 8px var(--neon-cyan); }
        #crosshair-v { top: 0; width: 1px; height: 100%; }
        #crosshair-h { left: 0; height: 1px; width: 100%; }

        /* Intel Card Animation */
        #intel-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translateX(130%); }
        #intel-card.visible { transform: translateX(0); }
        
        /* List Aesthetics */
        .target-item { border-left: 2px solid transparent; transition: all 0.3s; }
        .target-item:hover { background: rgba(255, 255, 255, 0.03); }
        .target-item.active-lock { border-left-color: var(--neon-cyan); background: rgba(0, 243, 255, 0.07); }

        #cmd-directory { display: none; }
        #cmd-directory.active { display: block; position: absolute; bottom: 100%; left: 0; width: 100%; background: #080a0f; border: 1px solid var(--neon-cyan); z-index: 5000; margin-bottom: 8px; }

        .btn-delete { color: rgba(255, 255, 255, 0.2); transition: all 0.2s; }
        .btn-delete:hover { color: var(--alert-red); transform: scale(1.2); }

        .mode-btn { transition: all 0.3s; border: 1px solid rgba(0, 243, 255, 0.1); }
        .mode-btn.active { background: var(--neon-cyan); color: #000; font-weight: 900; box-shadow: 0 0 15px var(--neon-cyan); }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-cyan); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="crosshair-v"></div>
    <div id="crosshair-h"></div>

    <main class="w-full max-w-[1850px] h-[96vh] flex flex-col gap-4">
        <header class="flex justify-between items-center px-8 py-4 glass rounded-lg border-cyan-500/20">
            <div class="flex items-center gap-12">
                <div>
                    <h1 class="text-3xl font-black tracking-tighter uppercase italic text-white leading-none">Titan-V</h1>
                    <span class="text-[9px] text-cyan-400 data-font font-bold tracking-[0.4em]">MULTI_MODE_MAP</span>
                </div>
                <div class="flex flex-wrap gap-1.5 max-w-[520px] justify-end">
                    <button type="button" id="btn-dark" onclick="setMode('dark')" class="mode-btn active px-3 py-1 text-[9px] data-font rounded">GRID</button>
                    <button type="button" id="btn-light" onclick="setMode('light')" class="mode-btn px-3 py-1 text-[9px] data-font rounded">DAY</button>
                    <button type="button" id="btn-sat" onclick="setMode('sat')" class="mode-btn px-3 py-1 text-[9px] data-font rounded">SAT</button>
                    <button type="button" id="btn-topo" onclick="setMode('topo')" class="mode-btn px-3 py-1 text-[9px] data-font rounded">TOPO</button>
                    <button type="button" id="btn-voyager" onclick="setMode('voyager')" class="mode-btn px-3 py-1 text-[9px] data-font rounded">VECTOR</button>
                </div>
            </div>
            <div class="text-right">
                <p class="text-xl font-bold data-font text-white" id="clock">00:00:00</p>
                <span class="text-[9px] text-cyan-500 font-black" id="ping">LATENCY: 8MS</span>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-4 flex-grow overflow-hidden">
            <!-- TARGET BUFFER -->
            <div class="col-span-3 glass rounded-lg p-6 flex flex-col overflow-hidden">
                <h3 class="text-[10px] font-black text-cyan-500 uppercase tracking-widest mb-6 underline decoration-cyan-500/30 underline-offset-8">Coordinate_Registry</h3>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="search-input" class="flex-grow bg-black/50 border border-white/10 p-3 text-xs data-font text-white focus:border-cyan-500 outline-none uppercase" placeholder="LOC_QUERY">
                    <button onclick="addTarget()" class="px-4 bg-cyan-500/10 border border-cyan-500/40 text-cyan-400 text-[10px] font-black hover:bg-cyan-500 hover:text-black transition-all">LOAD</button>
                </div>
                <div id="target-list" class="flex-grow space-y-2 overflow-y-auto pr-2"></div>
            </div>

            <!-- VIEWPORT -->
            <div class="col-span-6 relative rounded-lg overflow-hidden glass border-none">
                <div id="map"></div>
                
                <div id="intel-card" class="absolute top-6 right-6 z-[1000] w-64 glass p-5 border-l-2 border-cyan-500 shadow-2xl">
                    <span class="text-[8px] text-cyan-400 font-bold data-font block mb-4 uppercase tracking-widest">Atmospheric_Telemetry</span>
                    <h2 id="intel-name" class="text-xl font-black text-white mb-1 tracking-tighter uppercase">---</h2>
                    <p id="intel-coords" class="text-[10px] data-font text-white/30 mb-6 tracking-widest">0.00, 0.00</p>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-black/40 p-3 border border-white/5 rounded">
                            <span class="text-[8px] block text-white/20 mb-1 uppercase">Heat</span>
                            <span id="intel-temp" class="text-lg font-bold text-white data-font">--°C</span>
                        </div>
                        <div class="bg-black/40 p-3 border border-white/5 rounded">
                            <span class="text-[8px] block text-white/20 mb-1 uppercase">Wind</span>
                            <span id="intel-wind" class="text-lg font-bold text-white data-font">--KM/H</span>
                        </div>
                    </div>
                </div>

                <div class="absolute bottom-6 left-6 z-[1000]">
                    <div class="bg-black/90 px-4 py-2 border border-white/10">
                        <span id="coord-display" class="text-xs data-font text-cyan-400 font-bold tracking-widest">0.0000 | 0.0000</span>
                    </div>
                </div>
            </div>

            <!-- TERMINAL -->
            <div class="col-span-3 glass rounded-lg flex flex-col overflow-hidden">
                <div id="log" class="flex-grow p-6 data-font text-[11px] space-y-4 overflow-y-auto text-white/50">
                    <div class="text-cyan-400 font-bold">>> SYSTEM_READY</div>
                </div>
                <div class="p-6 bg-black/60 border-t border-white/10 relative">
                    <div id="cmd-directory" class="rounded overflow-hidden shadow-2xl">
                        <div id="suggest-list"></div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-cyan-500 font-black text-xl">»</span>
                        <input type="text" id="input" autocomplete="off" autofocus class="bg-transparent border-none outline-none text-sm data-font w-full text-white uppercase placeholder-cyan-900" placeholder="TYPE '\' FOR PROTOCOLS">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = (() => {
            const fromQuery = new URLSearchParams(location.search).get('api');
            if (fromQuery) {
                try { localStorage.setItem('titan_v_api_base', fromQuery.replace(/\/$/, '')); } catch (e) {}
                return fromQuery.replace(/\/$/, '');
            }
            try {
                const saved = localStorage.getItem('titan_v_api_base');
                if (saved) return saved.replace(/\/$/, '');
            } catch (e) {}
            return 'http://localhost:3000';
        })();

        let protocols = [
            { cmd: '\\MODE [KEY]', info: 'MAP: DARK|LIGHT|SAT|TOPO|VECTOR' },
            { cmd: '\\SCAN', info: 'PULL_TARGETS_FROM_API + LOG' },
            { cmd: '\\LOCATE [ID]', info: 'WARP TO TARGET (E.G. \\LOCATE 1)' },
            { cmd: '\\WEATHER [ID]', info: 'FETCH_WEATHER_FOR_TARGET_INDEX' },
            { cmd: '\\ADD [QUERY]', info: 'GEOCODE + POST_TARGET (E.G. \\ADD PARIS)' },
            { cmd: '\\GEOCODE [QUERY]', info: 'POST_GEOCODE_LOG_TOP_HIT' },
            { cmd: '\\SYNC', info: 'RELOAD_PROTOCOLS + TARGETS_FROM_API' },
            { cmd: '\\PING', info: 'CALL_API_SYSTEM_PING' },
            { cmd: '\\HEALTH', info: 'GET_/health_LIVENESS' },
            { cmd: '\\DOCS', info: 'OPEN_SWAGGER_UI_TAB' },
            { cmd: '\\API', info: 'LOG_API_BASE_AND_OPENAPI_URL' },
            { cmd: '\\CLEAR', info: 'PURGE_TERMINAL_LOG' },
            { cmd: '\\HELP', info: 'INDEX_COMMANDS' }
        ];

        let targetData = [], markers = [], cmdHistory = [], historyIndex = -1;
        
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);
        
        const layers = {
            dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                subdomains: 'abcd',
                maxZoom: 20,
            }),
            light: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                subdomains: 'abcd',
                maxZoom: 20,
            }),
            sat: L.tileLayer(
                'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                { maxZoom: 19 },
            ),
            topo: L.tileLayer(
                'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}',
                { maxZoom: 19 },
            ),
            voyager: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                subdomains: 'abcd',
                maxZoom: 20,
            }),
        };
        layers.dark.addTo(map);

        const input = document.getElementById('input');
        const cmdDir = document.getElementById('cmd-directory');
        const suggestList = document.getElementById('suggest-list');
        const coordDisplay = document.getElementById('coord-display');

        window.addEventListener('mousemove', (e) => {
            document.getElementById('crosshair-v').style.left = e.clientX + 'px';
            document.getElementById('crosshair-h').style.top = e.clientY + 'px';
            const rect = document.getElementById('map').getBoundingClientRect();
            if(e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                const latlng = map.mouseEventToLatLng(e);
                coordDisplay.innerText = `${latlng.lat.toFixed(4)} | ${latlng.lng.toFixed(4)}`;
            }
        });

        function writeLog(text, status = 'default') {
            const entry = document.createElement('div');
            entry.className = status === 'cmd' ? 'text-cyan-400 font-bold border-l border-cyan-500 pl-2' : (status === 'error' ? 'text-red-500 font-black' : '');
            entry.innerHTML = `<span class="opacity-20 mr-2">[${new Date().toLocaleTimeString('en-GB', { hour12: false })}]</span> ${text}`;
            document.getElementById('log').appendChild(entry);
            document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
        }

        async function fetchWeather(lat, lon) {
            try {
                const res = await fetch(`${API_BASE}/api/v1/weather?lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}`);
                if (!res.ok) return null;
                const data = await res.json();
                return data.current_weather;
            } catch (e) { return null; }
        }

        async function removeNode(id, event) {
            event.stopPropagation();
            const index = targetData.findIndex(t => String(t.id) === String(id));
            if (index > -1) {
                try {
                    const res = await fetch(`${API_BASE}/api/v1/targets/${encodeURIComponent(id)}`, { method: 'DELETE' });
                    if (!res.ok && res.status !== 404) throw new Error('DELETE_FAILED');
                } catch (e) {
                    writeLog('API_DELETE_FAILED', 'error');
                    return;
                }
                map.removeLayer(markers[index]);
                markers.splice(index, 1);
                targetData.splice(index, 1);
                writeLog(`NODE_REMOVED`, 'error');
                renderList();
                document.getElementById('intel-card').classList.remove('visible');
            }
        }

        function renderList() {
            const container = document.getElementById('target-list');
            container.innerHTML = '';
            targetData.forEach((node, i) => {
                const item = document.createElement('div');
                item.className = "target-item bg-white/5 p-4 rounded flex justify-between items-center text-[10px] data-font cursor-pointer";
                item.onclick = () => void runProtocol(`\\LOCATE ${i + 1}`);
                item.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-cyan-500 font-black">[${i+1}]</span>
                        <span class="text-white font-bold">${node.name}</span>
                    </div>
                    <button onclick="removeNode('${node.id}', event)" class="btn-delete font-black text-xs px-2">✕</button>
                `;
                container.appendChild(item);
            });
        }

        async function addTarget() {
            const q = document.getElementById('search-input').value;
            if (!q) return;
            try {
                const res = await fetch(`${API_BASE}/api/v1/geocode`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ q }),
                });
                const payload = await res.json().catch(() => ({}));
                if (!res.ok) {
                    writeLog(payload.message || 'GEOCODE_FAILED', 'error');
                    return;
                }
                const hit = payload.results && payload.results[0];
                if (!hit) {
                    writeLog('NO_RESULTS', 'error');
                    return;
                }
                const name = hit.displayName.split(',')[0].toUpperCase();
                const createRes = await fetch(`${API_BASE}/api/v1/targets`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, lat: hit.lat, lon: hit.lon }),
                });
                const created = await createRes.json().catch(() => ({}));
                if (!createRes.ok || !created.target) {
                    writeLog(created.message || 'TARGET_CREATE_FAILED', 'error');
                    return;
                }
                const node = {
                    id: created.target.id,
                    name: created.target.name,
                    lat: created.target.lat,
                    lon: created.target.lon,
                };
                targetData.push(node);
                const marker = L.circleMarker([node.lat, node.lon], { radius: 8, color: '#00f3ff', fillOpacity: 0.4 }).addTo(map);
                markers.push(marker);
                renderList();
                writeLog(`LOCKED: ${node.name}`, 'cmd');
                document.getElementById('search-input').value = '';
            } catch (e) {
                writeLog('NET_ERROR', 'error');
            }
        }

        function applyTargetsFromRows(rows) {
            markers.forEach((m) => map.removeLayer(m));
            markers = [];
            targetData = [];
            rows.forEach((row) => {
                const node = {
                    id: row.id,
                    name: row.name,
                    lat: Number(row.lat),
                    lon: Number(row.lon),
                };
                targetData.push(node);
                markers.push(
                    L.circleMarker([node.lat, node.lon], { radius: 8, color: '#00f3ff', fillOpacity: 0.4 }).addTo(map),
                );
            });
            renderList();
        }

        async function syncFromApi(opts = {}) {
            const quiet = opts.quiet === true;
            try {
                const [pRes, tRes] = await Promise.all([
                    fetch(`${API_BASE}/api/v1/protocols`),
                    fetch(`${API_BASE}/api/v1/targets`),
                ]);
                if (pRes.ok) {
                    const pJson = await pRes.json();
                    if (Array.isArray(pJson.protocols) && pJson.protocols.length) protocols = pJson.protocols;
                }
                if (tRes.ok) {
                    const tJson = await tRes.json();
                    applyTargetsFromRows(Array.isArray(tJson.targets) ? tJson.targets : []);
                }
                if (!quiet) writeLog(`API_LINK: ${API_BASE}`, 'cmd');
            } catch (e) {
                writeLog('API_UNREACHABLE — START API: cd api && npm run dev', 'error');
            }
        }

        async function runProtocol(raw) {
            const inputVal = raw.toUpperCase().replace(/[\[\]]/g, '').trim();
            const parts = inputVal.split(/\s+/).filter(Boolean);
            const cmd = parts[0];
            const arg = parts[1];
            const rest = parts.slice(1).join(' ').trim();

            cmdHistory.unshift(raw);
            historyIndex = -1;

            if (cmd === '\\MODE' || cmd === 'MODE') {
                const token = parts.slice(1).join(' ').toUpperCase().replace(/\s+/g, '').replace(/[^A-Z0-9]/g, '');
                const mode = resolveMapModeKey(token);
                if (!mode) {
                    writeLog('MODE_USAGE: \\MODE DARK | LIGHT | SAT | TOPO | VECTOR', 'error');
                    writeLog('ALIASES: GRID, DAY, SAT_STREAM, TERRAIN, VOYAGER', 'default');
                } else {
                    setMode(mode);
                }
            } else if (cmd === '\\SCAN' || cmd === 'SCAN') {
                writeLog('INIT_SCAN...', 'cmd');
                try {
                    const r = await fetch(`${API_BASE}/api/v1/targets`);
                    if (!r.ok) throw new Error('HTTP');
                    const j = await r.json();
                    const list = Array.isArray(j.targets) ? j.targets : [];
                    list.forEach((t) => writeLog(`NODE_${t.name}: UPLINK_OK`, 'default'));
                    writeLog(`BUFFER_COUNT: ${list.length}`, 'cmd');
                } catch (e) {
                    writeLog('SCAN_API_FAILED — FALLBACK_LOCAL', 'error');
                    targetData.forEach((t) => writeLog(`NODE_${t.name}: LOCAL_BUFFER`, 'default'));
                }
            } else if (cmd === '\\LOCATE' || cmd === 'LOCATE') {
                const target = targetData[parseInt(arg, 10) - 1] || targetData[targetData.length - 1];
                if (target) {
                    map.flyTo([target.lat, target.lon], 11);
                    document.getElementById('intel-card').classList.add('visible');
                    document.getElementById('intel-name').innerText = target.name;
                    document.getElementById('intel-coords').innerText = `${parseFloat(target.lat).toFixed(4)}, ${parseFloat(target.lon).toFixed(4)}`;
                    fetchWeather(target.lat, target.lon).then((w) => {
                        if (w) {
                            document.getElementById('intel-temp').innerText = `${w.temperature}°C`;
                            document.getElementById('intel-wind').innerText = `${w.windspeed}KM/H`;
                        }
                    });
                    writeLog(`JUMP_SUCCESS: ${target.name}`, 'cmd');
                } else {
                    writeLog('INVALID_NODE_ID', 'error');
                }
            } else if (cmd === '\\WEATHER' || cmd === 'WEATHER') {
                const idx = parseInt(arg, 10) - 1;
                const target = targetData[idx];
                if (!target) {
                    writeLog('INVALID_NODE_ID', 'error');
                } else {
                    const w = await fetchWeather(target.lat, target.lon);
                    if (w) {
                        writeLog(`WX_${target.name}: ${w.temperature}°C / WIND ${w.windspeed} KM/H`, 'cmd');
                    } else {
                        writeLog('WEATHER_API_FAILED', 'error');
                    }
                }
            } else if (cmd === '\\ADD' || cmd === 'ADD') {
                if (!rest) {
                    writeLog('ADD_USAGE: \\ADD <LOCATION_QUERY>', 'error');
                } else {
                    try {
                        const res = await fetch(`${API_BASE}/api/v1/geocode`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ q: rest }),
                        });
                        const payload = await res.json().catch(() => ({}));
                        if (!res.ok) {
                            writeLog(payload.message || 'GEOCODE_FAILED', 'error');
                        } else {
                            const hit = payload.results && payload.results[0];
                            if (!hit) writeLog('NO_RESULTS', 'error');
                            else {
                                const name = hit.displayName.split(',')[0].toUpperCase();
                                const createRes = await fetch(`${API_BASE}/api/v1/targets`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ name, lat: hit.lat, lon: hit.lon }),
                                });
                                const created = await createRes.json().catch(() => ({}));
                                if (!createRes.ok || !created.target) {
                                    writeLog(created.message || 'TARGET_CREATE_FAILED', 'error');
                                } else {
                                    const node = {
                                        id: created.target.id,
                                        name: created.target.name,
                                        lat: created.target.lat,
                                        lon: created.target.lon,
                                    };
                                    targetData.push(node);
                                    markers.push(
                                        L.circleMarker([node.lat, node.lon], {
                                            radius: 8,
                                            color: '#00f3ff',
                                            fillOpacity: 0.4,
                                        }).addTo(map),
                                    );
                                    renderList();
                                    writeLog(`LOCKED_VIA_CMD: ${node.name}`, 'cmd');
                                }
                            }
                        }
                    } catch (e) {
                        writeLog('NET_ERROR', 'error');
                    }
                }
            } else if (cmd === '\\GEOCODE' || cmd === 'GEOCODE') {
                if (!rest) {
                    writeLog('GEOCODE_USAGE: \\GEOCODE <LOCATION_QUERY>', 'error');
                } else {
                    try {
                        const res = await fetch(`${API_BASE}/api/v1/geocode`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ q: rest }),
                        });
                        const payload = await res.json().catch(() => ({}));
                        if (!res.ok) writeLog(payload.message || 'GEOCODE_FAILED', 'error');
                        else {
                            const hits = payload.results || [];
                            if (!hits.length) writeLog('NO_RESULTS', 'error');
                            else {
                                const h = hits[0];
                                writeLog(`TOP_HIT: ${h.lat.toFixed(5)}, ${h.lon.toFixed(5)}`, 'cmd');
                                writeLog(h.displayName, 'default');
                            }
                        }
                    } catch (e) {
                        writeLog('NET_ERROR', 'error');
                    }
                }
            } else if (cmd === '\\SYNC' || cmd === 'SYNC') {
                await syncFromApi({ quiet: true });
                writeLog('SYNC_COMPLETE // PROTOCOLS + TARGETS', 'cmd');
            } else if (cmd === '\\PING' || cmd === 'PING') {
                const t0 = performance.now();
                try {
                    const r = await fetch(`${API_BASE}/api/v1/system/ping`);
                    const ms = Math.round(performance.now() - t0);
                    if (r.ok) {
                        const j = await r.json().catch(() => ({}));
                        writeLog(`PING_OK ${ms}MS // ${j.serverTime || ''}`, 'cmd');
                    } else writeLog('PING_HTTP_ERR', 'error');
                } catch (e) {
                    writeLog('PING_FAILED', 'error');
                }
            } else if (cmd === '\\HEALTH' || cmd === 'HEALTH') {
                try {
                    const r = await fetch(`${API_BASE}/health`);
                    const j = await r.json().catch(() => ({}));
                    if (r.ok) writeLog(`HEALTH: ${j.status} // ${j.service}`, 'cmd');
                    else writeLog('HEALTH_HTTP_ERR', 'error');
                } catch (e) {
                    writeLog('HEALTH_FAILED', 'error');
                }
            } else if (cmd === '\\DOCS' || cmd === 'DOCS') {
                window.open(`${API_BASE}/docs`, '_blank', 'noopener,noreferrer');
                writeLog(`OPENED_DOCS: ${API_BASE}/docs`, 'cmd');
            } else if (cmd === '\\API' || cmd === 'API') {
                writeLog(`API_BASE: ${API_BASE}`, 'cmd');
                writeLog(`OPENAPI_JSON: ${API_BASE}/openapi.json`, 'default');
                writeLog(`SWAGGER: ${API_BASE}/docs`, 'default');
            } else if (cmd === '\\CLEAR' || cmd === 'CLEAR') {
                document.getElementById('log').innerHTML = '<div class="text-cyan-400 font-bold">>> TERMINAL_CLEARED</div>';
            } else if (cmd === '\\HELP' || cmd === 'HELP') {
                writeLog('--- TITAN_PROTOCOLS ---', 'cmd');
                protocols.forEach((p) => writeLog(`${p.cmd} >> ${p.info}`));
                writeLog('ARGS: USE SPACE AFTER COMMAND (E.G. \\ADD LONDON). \\LOCATE USES LIST INDEX.', 'default');
            } else {
                writeLog(`UNKNOWN_CMD: ${cmd}`, 'error');
            }

            input.value = '';
            cmdDir.classList.remove('active');
        }

        const MAP_MODE_ALIASES = {
            DARK: 'dark',
            GRID: 'dark',
            NIGHT: 'dark',
            LIGHT: 'light',
            DAY: 'light',
            SAT: 'sat',
            SATSTREAM: 'sat',
            IMAGERY: 'sat',
            TOPO: 'topo',
            TERRAIN: 'topo',
            VECTOR: 'voyager',
            VOYAGER: 'voyager',
        };

        function resolveMapModeKey(token) {
            if (!token) return null;
            const k = token.replace(/[^A-Z0-9]/g, '');
            return MAP_MODE_ALIASES[k] || null;
        }

        function setMode(mode, opts = {}) {
            if (!layers[mode]) {
                writeLog(`INVALID_MAP_MODE: ${mode}`, 'error');
                return;
            }
            Object.values(layers).forEach((layer) => {
                if (map.hasLayer(layer)) map.removeLayer(layer);
            });
            layers[mode].addTo(map);
            document.querySelectorAll('.mode-btn').forEach((btn) => btn.classList.remove('active'));
            const btn = document.getElementById(`btn-${mode}`);
            if (btn) btn.classList.add('active');
            if (!opts.silent) writeLog(`VIEW_MODE: ${mode.toUpperCase()}`, 'cmd');
            try {
                localStorage.setItem('titan_v_map_mode', mode);
            } catch (e) {}
        }

        try {
            const savedMode = localStorage.getItem('titan_v_map_mode');
            if (savedMode && layers[savedMode]) setMode(savedMode, { silent: true });
        } catch (e) {}

        input.addEventListener('input', (e) => {
            const val = e.target.value.toUpperCase();
            if(val.startsWith('\\')) {
                const matches = protocols.filter(p => p.cmd.startsWith(val));
                if(matches.length > 0) {
                    cmdDir.classList.add('active');
                    suggestList.innerHTML = matches.map(m => `
                        <div class="p-3 cursor-pointer hover:bg-cyan-500/20 text-[10px] data-font flex justify-between border-b border-white/5" onclick="void runProtocol('${m.cmd}')">
                            <span class="text-cyan-400 font-black">${m.cmd}</span>
                            <span class="text-white/20 uppercase">${m.info}</span>
                        </div>
                    `).join('');
                } else { cmdDir.classList.remove('active'); }
            } else { cmdDir.classList.remove('active'); }
        });

        input.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') void runProtocol(input.value);
            if(e.key === 'ArrowUp') { e.preventDefault(); if(historyIndex < cmdHistory.length-1) input.value = cmdHistory[++historyIndex]; }
        });

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB', { hour12: false });
        }, 1000);

        async function refreshPing() {
            const el = document.getElementById('ping');
            const t0 = performance.now();
            try {
                const r = await fetch(`${API_BASE}/api/v1/system/ping`);
                const ms = Math.round(performance.now() - t0);
                el.innerText = r.ok ? `LATENCY: ${ms}MS` : 'LATENCY: ERR';
            } catch (e) {
                el.innerText = 'LATENCY: --';
            }
        }

        syncFromApi();
        refreshPing();
        setInterval(refreshPing, 4000);
    </script>
</body>
</html>
