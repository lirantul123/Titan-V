<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN_ENGINE // GEOSPATIAL_v11_MODES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { --neon-cyan: #00f3ff; --alert-red: #ff3131; }
        body { background-color: #020203; font-family: 'Inter', sans-serif; overflow: hidden; color: #e0e0e0; cursor: crosshair; }
        .glass { background: rgba(10, 12, 18, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(0, 243, 255, 0.2); }
        .data-font { font-family: 'JetBrains Mono', monospace; }
        
        #map { background: #000; height: 100%; width: 100%; }

        #cursor-line-v { position: fixed; top: 0; width: 1px; height: 100%; background: rgba(0, 243, 255, 0.1); pointer-events: none; z-index: 99; }
        #cursor-line-h { position: fixed; left: 0; height: 1px; width: 100%; background: rgba(0, 243, 255, 0.1); pointer-events: none; z-index: 99; }
        
        .mode-btn { transition: all 0.3s; border: 1px solid rgba(0, 243, 255, 0.1); }
        .mode-btn.active { background: var(--neon-cyan); color: #000; font-weight: 900; box-shadow: 0 0 15px var(--neon-cyan); }

        #cmd-directory { 
            display: none; position: absolute; bottom: calc(100% + 10px); left: 0; width: 100%; 
            background: #080a0f; border: 1px solid var(--neon-cyan); z-index: 100; 
        }

        .scanning-bar { position: absolute; width: 100%; height: 3px; background: var(--neon-cyan); top: 0; left: 0; z-index: 1001; pointer-events: none; opacity: 0; box-shadow: 0 0 15px var(--neon-cyan); }
        .active-scan .scanning-bar { animation: scan-anim 2s linear infinite; opacity: 1; }
        @keyframes scan-anim { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="cursor-line-v"></div>
    <div id="cursor-line-h"></div>

    <main class="w-full max-w-[1750px] h-[92vh] flex flex-col gap-4 relative">
        <header class="flex justify-between items-center px-8 py-5 glass rounded-lg border-cyan-500/30">
            <div class="flex items-center gap-10">
                <div>
                    <h1 class="text-3xl font-black tracking-tighter uppercase italic text-white leading-none">Titan_v11</h1>
                    <span class="text-[10px] text-cyan-400 data-font font-bold tracking-[0.2em]">MULTI_MODE_OS</span>
                </div>
                
                <!-- MODE SWITCHER -->
                <div class="flex gap-2">
                    <button id="btn-dark" onclick="setMode('dark')" class="mode-btn active px-3 py-1 text-[10px] data-font rounded">DEEP_GRID</button>
                    <button id="btn-sat" onclick="setMode('sat')" class="mode-btn px-3 py-1 text-[10px] data-font rounded">SAT_STREAM</button>
                </div>
            </div>

            <div class="text-right">
                <p class="text-xl font-bold data-font text-white" id="clock">00:00:00</p>
                <span id="ping-val" class="text-[9px] text-cyan-500 font-black tracking-widest">MS_SYNC_OK</span>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-4 flex-grow overflow-hidden">
            <div class="col-span-3 glass rounded-lg p-6 flex flex-col">
                <h3 class="text-[11px] font-black text-cyan-500 uppercase tracking-widest mb-6">Network_Grid</h3>
                <div id="nodes" class="space-y-6"></div>
            </div>

            <div class="col-span-6 glass rounded-lg relative overflow-hidden" id="map-viewport">
                <div class="scanning-bar"></div>
                <div id="map"></div>
                <div class="absolute top-6 left-6 z-[1000]">
                    <div class="bg-black/90 px-4 py-2 border-l-2 border-cyan-400 shadow-2xl">
                        <span class="text-[9px] text-white/40 block">LAT_LNG_STREAM</span>
                        <span id="coord-display" class="text-xs data-font text-white font-bold">0.000, 0.000</span>
                    </div>
                </div>
            </div>

            <div class="col-span-3 glass rounded-lg flex flex-col overflow-hidden">
                <div id="log" class="flex-grow p-6 data-font text-[12px] space-y-4 overflow-y-auto text-white/50">
                    <div class="text-cyan-400 font-bold">MODES_LOADED // DARK_MATTER_ACTIVE</div>
                </div>

                <div class="p-6 bg-black/60 border-t border-white/10 relative">
                    <div id="cmd-directory" class="rounded-t overflow-hidden">
                        <div id="suggest-list" class="p-2"></div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-cyan-500 font-black text-xl">»</span>
                        <input type="text" id="input" autocomplete="off" autofocus
                               class="bg-transparent border-none outline-none text-sm data-font w-full text-white placeholder-cyan-900 uppercase" 
                               placeholder="CMD_">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const DATABASE = [
            { cmd: '\\SCAN', info: 'RADAR_PULSE' },
            { cmd: '\\CLEAR', info: 'PURGE_LOGS' },
            { cmd: '\\ALERT', info: 'SYS_WARNING' },
            { cmd: '\\REBOOT', info: 'KERNEL_RESET' }
        ];

        // MAP SETUP
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([32.864, 35.291], 13);
        
        const layers = {
            dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'),
            sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
        };

        layers.dark.addTo(map);

        function setMode(mode) {
            Object.values(layers).forEach(layer => map.removeLayer(layer));
            layers[mode].addTo(map);
            
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
            
            writeLog(`MAP_MODE_CHANGED: ${mode.toUpperCase()}`, 'cmd');
        }

        // LOGIC & TERMINAL
        const input = document.getElementById('input');
        const logBox = document.getElementById('log');
        const cmdDir = document.getElementById('cmd-directory');
        const suggestList = document.getElementById('suggest-list');

        function writeLog(text, status = 'default') {
            const entry = document.createElement('div');
            entry.className = status === 'cmd' ? 'text-cyan-400 font-bold' : (status === 'error' ? 'text-red-500 font-black' : 'text-white/60');
            entry.innerHTML = `<span class="opacity-30 mr-2">[${new Date().toLocaleTimeString('en-GB', { hour12: false })}]</span> ${text}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function runProtocol(raw) {
            const cmdText = raw.toUpperCase().trim();
            if (!cmdText) return;

            const match = DATABASE.find(i => i.cmd === cmdText || i.cmd === `\\${cmdText}`);

            if (match) {
                writeLog(`EXECUTE: ${match.cmd}`, 'cmd');
                if (match.cmd === '\\SCAN') {
                    document.getElementById('map-viewport').classList.add('active-scan');
                    setTimeout(() => document.getElementById('map-viewport').classList.remove('active-scan'), 2000);
                } else if (match.cmd === '\\CLEAR') logBox.innerHTML = '';
                else if (match.cmd === '\\REBOOT') location.reload();
            } else {
                writeLog(`INVALID_INPUT: ${cmdText}`, 'error');
            }
            input.value = '';
            cmdDir.style.display = 'none';
        }

        input.addEventListener('input', (e) => {
            const val = e.target.value.toUpperCase();
            if (val.length > 0) {
                const search = val.startsWith('\\') ? val : `\\${val}`;
                const matches = DATABASE.filter(i => i.cmd.startsWith(search));
                if (matches.length) {
                    cmdDir.style.display = 'block';
                    suggestList.innerHTML = matches.map(m => `
                        <div class="p-2 cursor-pointer hover:bg-cyan-500/10 text-[11px] data-font flex justify-between" onclick="runProtocol('${m.cmd}')">
                            <span class="text-white">${m.cmd}</span>
                            <span class="text-cyan-900 italic">${m.info}</span>
                        </div>
                    `).join('');
                } else cmdDir.style.display = 'none';
            } else cmdDir.style.display = 'none';
        });

        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') runProtocol(input.value); });
        
        window.addEventListener('mousemove', (e) => {
            document.getElementById('cursor-line-v').style.left = e.clientX + 'px';
            document.getElementById('cursor-line-h').style.top = e.clientY + 'px';
        });

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB', { hour12: false });
            document.getElementById('ping-val').innerText = `${Math.floor(Math.random()*15 + 5)}MS_SYNC_OK`;
        }, 1000);

        map.on('move', () => {
            const c = map.getCenter();
            document.getElementById('coord-display').innerText = `${c.lat.toFixed(3)}, ${c.lng.toFixed(3)}`;
        });

        window.runProtocol = runProtocol;
        const nodeList = document.getElementById('nodes');
        ['SAT_ALPHA', 'HUB_MAIN', 'GND_04'].forEach(name => {
            nodeList.innerHTML += `<div class="space-y-2"><div class="flex justify-between text-[9px] font-black"><span class="text-white/40">${name}</span><span class="text-green-500">LINKED</span></div><div class="h-[1px] w-full bg-white/10 relative"><div class="absolute h-full bg-cyan-500 shadow-[0_0_8px_cyan]" style="width: ${Math.random()*100}%"></div></div></div>`;
        });
    </script>
</body>
</html>
